<div class="container mx-auto px-4 py-10 max-w-xl">
  
  <div class="text-center mb-8">
    <div class="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-emerald-100 shadow-sm">
      <span class="text-3xl">👤</span>
    </div>
    <h2 class="text-xl font-extrabold text-gray-800 tracking-tight uppercase">
      {{ nombreCompleto }}
    </h2>
    <p class="text-xs text-gray-400 font-medium mt-1">
      {{ correoElectronico }}
    </p>
    <div class="mt-3">
      <span class="bg-emerald-50 text-emerald-700 border border-emerald-100 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">
        {{ rolUsuario }}
      </span>
    </div>
  </div>

  <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm mb-4">
    <h3 class="text-sm font-bold text-gray-800 mb-5">Información personal</h3>
    
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-gray-400 mb-2">Teléfono</label>
        <div class="relative">
          <span class="absolute left-4 top-3 text-gray-400 text-sm">📞</span>
          <input type="text" [(ngModel)]="telefono" placeholder="Tu teléfono"
            class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:border-emerald-500 transition text-gray-700">
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-400 mb-2">Distrito</label>
        <select [(ngModel)]="distrito" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:border-emerald-500 bg-white transition text-gray-700">
          <option value="" disabled selected>Selecciona distrito</option>
          <option value="huancayo">Huancayo</option>
          <option value="el-tambo">El Tambo</option>
          <option value="chilca">Chilca</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-400 mb-2">Dirección</label>
        <div class="relative">
          <span class="absolute left-4 top-3 text-gray-400 text-sm">📍</span>
          <input type="text" [(ngModel)]="direccion" placeholder="Tu dirección"
            class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:border-emerald-500 transition text-gray-700">
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-400 mb-2">Acerca de mí</label>
        <textarea rows="3" [(ngModel)]="acercaDeMi" placeholder="Cuéntanos algo sobre ti..."
          class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm outline-none focus:border-emerald-500 transition resize-none text-gray-700"></textarea>
      </div>
    </div>

    <button type="button" (click)="guardarCambios()"
      class="w-full bg-emerald-600 text-white text-sm font-bold py-3 px-4 rounded-xl mt-6 hover:bg-emerald-700 transition shadow-md">
      Guardar Cambios
    </button>
  </div>

</div>
