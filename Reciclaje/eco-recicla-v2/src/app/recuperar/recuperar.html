<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
    
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-green-800">Recuperar contraseña</h2>
      <p class="text-gray-500 text-sm mt-2">Introduce tu correo y te enviaremos un enlace para restaurar tu contraseña</p>
    </div>

    <form [formGroup]="formularioRecuperar" (ngSubmit)="enviarInstrucciones()" class="space-y-6">
      
      <!-- Correo Electrónico -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
        <input type="email" formControlName="correo" placeholder="ejemplo@correo.com" 
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none transition">
          
        @if(formularioRecuperar.get('correo')?.invalid && formularioRecuperar.get('correo')?.touched) {
          <span class="text-red-500 text-xs mt-1 font-medium block">
            Ingresa un correo válido (debe llevar @).
          </span>
        }
      </div>

      <!-- Botón de Envío -->
      <button type="submit"
        class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition shadow-lg transform hover:scale-[1.02]">
        Enviar instrucciones
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-600">
      <a routerLink="/login" class="text-green-600 font-bold hover:underline cursor-pointer">
        ⬅ Volver al inicio de sesión
      </a>
    </div>
  </div>
</div>
