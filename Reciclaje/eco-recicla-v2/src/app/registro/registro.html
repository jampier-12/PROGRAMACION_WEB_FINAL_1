<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-green-800">Crea tu cuenta</h2>
      <p class="text-gray-500 mt-2">Únete para registrar tus reciclajes en Huancayo</p>
    </div>

    <form [formGroup]="formularioRegistro" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Nombre Completo</label>
        <input type="text" formControlName="nombre" placeholder="Tu nombre" 
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
        <input type="email" formControlName="correo" placeholder="ejemplo@correo.com" 
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
        <input type="password" formControlName="contrasenia" placeholder="••••••••" 
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none transition">
      </div>

      <button type="button" (click)="registrarUsuario()"
        class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition shadow-lg transform hover:scale-[1.02]">
        Registrarme
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-600">
      ¿Ya tienes cuenta? 
      <a routerLink="/login" class="text-green-600 font-bold hover:underline cursor-pointer">Inicia sesión aquí</a>
    </div>
  </div>
</div>
