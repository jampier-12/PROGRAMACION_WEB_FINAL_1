<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-green-800">¡Bienvenido de vuelta!</h2>
      <p class="text-gray-500 mt-2">Ingresa a tu cuenta para registrar tus reciclajes</p>
    </div>

    <form [formGroup]="formularioLogin" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
        <input type="email" formControlName="correo" placeholder="ejemplo@correo.com" 
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none transition">
          
        <span *ngIf="formularioLogin.get('correo')?.invalid && formularioLogin.get('correo')?.touched" 
              class="text-red-500 text-xs mt-1 font-medium block">
          Ingresa un correo válido (debe llevar @).
        </span>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
        <input type="password" formControlName="contrasenia" placeholder="••••••••" 
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none transition">
          
        <span *ngIf="formularioLogin.get('contrasenia')?.invalid && formularioLogin.get('contrasenia')?.touched" 
              class="text-red-500 text-xs mt-1 font-medium block">
          La contraseña es obligatoria.
        </span>
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center text-gray-600">
          <input type="checkbox" class="mr-2 rounded text-green-600 focus:ring-green-500"> Recordarme
        </label>
        <a routerLink="/recuperar" class="text-green-600 hover:text-green-800 font-semibold cursor-pointer">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <button type="button" (click)="ingresar()"
        class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition shadow-lg transform hover:scale-[1.02]">
        Ingresar a mi cuenta
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-600">
      ¿Aún no tienes cuenta? 
      <a routerLink="/registro" class="text-green-600 font-bold hover:underline cursor-pointer">Regístrate aquí</a>
    </div>
  </div>
</div>
